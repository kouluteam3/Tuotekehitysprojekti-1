<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FixIt - Etusivu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <iframe src="Templates/header.html" onload="this.insertAdjacentHTML('afterend', (this.contentDocument.body||this.contentDocument).innerHTML);this.remove()"></iframe>
    <main>
        <section class="hero">
            <div class="container">
                <div style="display: flex; align-items: center; justify-content: space-between; gap: 40px;">
                    <div class="hero-text">
                        <h1>Hajosiko puhelimesi tai muu laite?</h1>
                        <p>Korjaamme laitteesi edullisesti ja luotettavasti.</p>
                        <div style="margin-top: 20px;">
                            <button class="btn-cta">Varaa huolto</button>
                            <button class="btn-cta" style="background-color: var(--dark-bg); margin-left: 10px;">Katso hinnasto</button>
                        </div>
                    </div>
                    <div class="hero-image">
                        <img src="Resources/Images/cell-phone-smartphone-mobile-cellphone-preview.png" alt="Rikkinäinen puhelin" style="max-width: 400px; border-radius: 20px;">
                    </div>
                </div>
            </div>
        </section>
        <section class="container" style="text-align: center; padding: 60px 0;">
            <h2 style="color: var(--light-tan); margin-bottom: 40px;">Luotettavat huollot</h2>
            
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;">
                <div class="feature-item">
                    <div class="icon" style="font-size: 3rem; margin-bottom: 10px;"><img src="Resources/Images/shield.png" alt="Shield"></div>
                    <p><strong>Takuu 12kk</strong></p>
                </div>
                <div class="feature-item">
                    <div class="icon" style="font-size: 3rem; margin-bottom: 10px;"><img src="Resources/Images/checked.png" alt="Check"></div>
                    <p><strong>Laadukkaat osat</strong></p>
                </div>
                <div class="feature-item">
                    <div class="icon" style="font-size: 3rem; margin-bottom: 10px;"><img src="Resources/Images/clock.png" alt="Clock"></div>
                    <p><strong>Nopea korjaus</strong></p>
                </div>
            </div>
        </section>
    </main>
    <iframe src="Templates/footer.html" onload="this.insertAdjacentHTML('afterend', (this.contentDocument.body||this.contentDocument).innerHTML);this.remove()"></iframe>
</body>

</html>
